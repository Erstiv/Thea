# Project Thea — Home Media Automation Stack
# Deploy to: /opt/thea/docker-compose.yml on Hetzner (ssh filou)
#
# Usage:
#   cd /opt/thea && docker compose up -d
#   docker compose logs -f sonarr
#   docker compose down
#   docker compose pull && docker compose up -d   (update all)

services:

  # ─── INDEXER MANAGER ───────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  # ─── TV AUTOMATION ─────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/sonarr:/config
      - /data:/data
    ports:
      - "8989:8989"
    restart: unless-stopped
    depends_on:
      - prowlarr

  # ─── MOVIE AUTOMATION ──────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/radarr:/config
      - /data:/data
    ports:
      - "7878:7878"
    restart: unless-stopped
    depends_on:
      - prowlarr

  # ─── MUSIC AUTOMATION ──────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/lidarr:/config
      - /data:/data
    ports:
      - "8686:8686"
    restart: unless-stopped
    depends_on:
      - prowlarr

  # ─── SUBTITLE MANAGEMENT ───────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/bazarr:/config
      - /data/media:/data/media
    ports:
      - "6767:6767"
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr

  # ─── USENET DOWNLOAD CLIENT ────────────────────────────────
  # Primary download path — uses Giganews
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/sabnzbd:/config
      - /data/usenet:/data/usenet
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ─── VPN CONTAINER (for torrent traffic) ───────────────────
  # All qBittorrent traffic routes through this VPN container
  # Using gluetun — supports VyprVPN (WireGuard or OpenVPN)
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=vyprvpn
      - VPN_TYPE=openvpn
      # Set these in .env file:
      - OPENVPN_USER=${VYPRVPN_USER}
      - OPENVPN_PASSWORD=${VYPRVPN_PASS}
      - SERVER_REGIONS=US East
      # Kill switch is built-in — if VPN drops, all traffic stops
      - FIREWALL_VPN_INPUT_PORTS=8085
    volumes:
      - /opt/thea/configs/gluetun:/gluetun
    ports:
      # qBittorrent web UI — exposed through gluetun
      - "8085:8085"
    restart: unless-stopped

  # ─── TORRENT DOWNLOAD CLIENT ───────────────────────────────
  # Backup download path — all traffic routed through gluetun VPN
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8085
    volumes:
      - /opt/thea/configs/qbittorrent:/config
      - /data/torrents:/data/torrents
    # No ports here — traffic goes through gluetun's network
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped

  # ─── CONTENT REQUEST UI ────────────────────────────────────
  # Pretty web interface to search and request movies/shows
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/overseerr:/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  # ─── QUALITY PROFILE SYNC ─────────────────────────────────
  # Syncs TRaSH Guide quality profiles into Sonarr/Radarr
  # Runs on a schedule (not a web UI — just a cron-like container)
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=America/New_York
    volumes:
      - /opt/thea/configs/recyclarr:/config
    restart: unless-stopped

  # ─── NOTIFICATION RELAY ────────────────────────────────────
  notifiarr:
    image: golift/notifiarr:latest
    container_name: notifiarr
    environment:
      - DN_API_KEY=${NOTIFIARR_API_KEY}
    volumes:
      - /opt/thea/configs/notifiarr:/config
    ports:
      - "5454:5454"
    restart: unless-stopped

  # ─── SNAP & GRAB ─────────────────────────────────────────
  # Photo-identify movies/TV → check Plex → add to Radarr/Sonarr
  # Custom app: take a photo of any screen, Gemini identifies it
  snap-and-grab:
    build: /opt/thea/snap-and-grab
    container_name: snap-and-grab
    environment:
      - TZ=America/New_York
    env_file:
      - /opt/thea/snap-and-grab/.env
    ports:
      - "3010:3010"
    restart: unless-stopped
    depends_on:
      - radarr
      - sonarr

  # ─── FLARESOLVERR ─────────────────────────────────────────
  # Some indexers use Cloudflare protection — this solves CAPTCHAs
  # Prowlarr connects to this automatically
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/New_York
    ports:
      - "8191:8191"
    restart: unless-stopped
