# Project Thea — Nginx Reverse Proxy
# Location on server: /etc/nginx/sites-available/thea
# Symlink: ln -s /etc/nginx/sites-available/thea /etc/nginx/sites-enabled/
#
# After placing this file, run:
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d quietferal.com -d snap.quietferal.com

# Main site — Overseerr (the pretty request UI)
server {
    listen 80;
    server_name quietferal.com;

    location / {
        proxy_pass http://localhost:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Snap & Grab — the movie night party app
server {
    listen 80;
    server_name snap.quietferal.com;

    location / {
        proxy_pass http://localhost:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for party mode)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Larger body size for base64 image uploads
    client_max_body_size 20M;
}
